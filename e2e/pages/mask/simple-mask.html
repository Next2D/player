<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Next2D E2E - Simple Mask</title>
    <script defer type="module" src="/src/index.ts"></script>
    <style>
        body { margin: 0; padding: 0; background: #333333; }
    </style>
</head>
<body>
<script type="module">
    window.addEventListener("DOMContentLoaded", async () => {
        const root = await next2d.createRootMovieClip(400, 400, 60);
        const { Shape, Sprite } = next2d.display;

        // シンプルな円形マスクテスト
        const container = new Sprite();
        container.x = 50;
        container.y = 50;
        root.addChild(container);

        // マスク対象（赤い四角）
        const target = new Shape();
        target.graphics
            .beginFill(0xFF0000, 1.0)
            .drawRect(0, 0, 200, 200)
            .endFill();
        container.addChild(target);

        // 円形マスク
        const circleMask = new Shape();
        circleMask.graphics
            .beginFill(0xFFFFFF, 1.0)
            .drawCircle(100, 100, 80)
            .endFill();
        container.addChild(circleMask);
        target.mask = circleMask;

        window.__E2E_RENDER_COMPLETE__ = true;
    });
</script>
</body>
</html>
