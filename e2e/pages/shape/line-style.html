<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Next2D E2E - Line Style</title>
    <script defer type="module" src="/src/index.ts"></script>
    <style>
        body { margin: 0; padding: 0; background: #333333; }
    </style>
</head>
<body>
<script type="module">
    window.addEventListener("DOMContentLoaded", async () => {
        const root = await next2d.createRootMovieClip(600, 500, 60);
        const { Shape } = next2d.display;

        // ===== 線の太さテスト =====

        // 細い線（1px）
        const line1 = new Shape();
        line1.graphics
            .lineStyle(1, 0xFF0000, 1.0)
            .moveTo(20, 30)
            .lineTo(180, 30);
        root.addChild(line1);

        // 中程度の線（3px）
        const line2 = new Shape();
        line2.graphics
            .lineStyle(3, 0x00FF00, 1.0)
            .moveTo(20, 60)
            .lineTo(180, 60);
        root.addChild(line2);

        // 太い線（8px）
        const line3 = new Shape();
        line3.graphics
            .lineStyle(8, 0x0000FF, 1.0)
            .moveTo(20, 100)
            .lineTo(180, 100);
        root.addChild(line3);

        // 非常に太い線（15px）
        const line4 = new Shape();
        line4.graphics
            .lineStyle(15, 0xFFFF00, 1.0)
            .moveTo(20, 150)
            .lineTo(180, 150);
        root.addChild(line4);

        // ===== Caps（線端スタイル）テスト =====

        // caps: none
        const capsNone = new Shape();
        capsNone.graphics
            .lineStyle(12, 0xFF0000, 1.0, false, "normal", "none")
            .moveTo(220, 50)
            .lineTo(380, 50);
        root.addChild(capsNone);

        // caps: round
        const capsRound = new Shape();
        capsRound.graphics
            .lineStyle(12, 0x00FF00, 1.0, false, "normal", "round")
            .moveTo(220, 90)
            .lineTo(380, 90);
        root.addChild(capsRound);

        // caps: square
        const capsSquare = new Shape();
        capsSquare.graphics
            .lineStyle(12, 0x0000FF, 1.0, false, "normal", "square")
            .moveTo(220, 130)
            .lineTo(380, 130);
        root.addChild(capsSquare);

        // ===== Joints（線結合スタイル）テスト =====

        // joints: bevel
        const jointBevel = new Shape();
        jointBevel.graphics
            .lineStyle(12, 0xFF0000, 1.0, false, "normal", "round", "bevel")
            .moveTo(420, 30)
            .lineTo(480, 80)
            .lineTo(540, 30);
        root.addChild(jointBevel);

        // joints: miter
        const jointMiter = new Shape();
        jointMiter.graphics
            .lineStyle(12, 0x00FF00, 1.0, false, "normal", "round", "miter")
            .moveTo(420, 90)
            .lineTo(480, 140)
            .lineTo(540, 90);
        root.addChild(jointMiter);

        // joints: round
        const jointRound = new Shape();
        jointRound.graphics
            .lineStyle(12, 0x0000FF, 1.0, false, "normal", "round", "round")
            .moveTo(420, 150)
            .lineTo(480, 200)
            .lineTo(540, 150);
        root.addChild(jointRound);

        // ===== Alpha（透明度）テスト =====

        // alpha: 1.0
        const alpha1 = new Shape();
        alpha1.graphics
            .lineStyle(10, 0xFFFFFF, 1.0)
            .moveTo(20, 220)
            .lineTo(180, 220);
        root.addChild(alpha1);

        // alpha: 0.7
        const alpha2 = new Shape();
        alpha2.graphics
            .lineStyle(10, 0xFFFFFF, 0.7)
            .moveTo(20, 250)
            .lineTo(180, 250);
        root.addChild(alpha2);

        // alpha: 0.4
        const alpha3 = new Shape();
        alpha3.graphics
            .lineStyle(10, 0xFFFFFF, 0.4)
            .moveTo(20, 280)
            .lineTo(180, 280);
        root.addChild(alpha3);

        // ===== 複合テスト（様々な組み合わせ） =====

        // 三角形（closed path）with miter joints
        const triangle = new Shape();
        triangle.graphics
            .lineStyle(8, 0xFF00FF, 1.0, false, "normal", "none", "miter")
            .moveTo(220, 220)
            .lineTo(320, 320)
            .lineTo(120, 320)
            .lineTo(220, 220);
        root.addChild(triangle);

        // 複雑なパス with round caps and joints
        const complex = new Shape();
        complex.graphics
            .lineStyle(6, 0x00FFFF, 1.0, false, "normal", "round", "round")
            .moveTo(350, 250)
            .lineTo(400, 220)
            .lineTo(450, 280)
            .lineTo(500, 220)
            .lineTo(550, 280);
        root.addChild(complex);

        // 矩形の枠線
        const rect = new Shape();
        rect.graphics
            .lineStyle(4, 0xFFFF00, 1.0, false, "normal", "square", "miter")
            .drawRect(350, 320, 150, 80);
        root.addChild(rect);

        // 閉じていないパス（bevel joints）
        const zigzag = new Shape();
        zigzag.graphics
            .lineStyle(10, 0xFF8800, 1.0, false, "normal", "round", "bevel")
            .moveTo(20, 380)
            .lineTo(60, 420)
            .lineTo(100, 380)
            .lineTo(140, 420)
            .lineTo(180, 380)
            .lineTo(220, 420)
            .lineTo(260, 380);
        root.addChild(zigzag);

        window.__E2E_RENDER_COMPLETE__ = true;
    });
</script>
</body>
</html>
