<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Next2D E2E - GradientBevelFilter</title>
    <script defer type="module" src="/src/index.ts"></script>
    <style>
        body { margin: 0; padding: 0; background: #666666; }
    </style>
</head>
<body>
<script type="module">
    window.addEventListener("DOMContentLoaded", async () => {
        const root = await next2d.createRootMovieClip(600, 500, 60);
        const { Shape } = next2d.display;
        const { GradientBevelFilter } = next2d.filters;

        // テスト用シェイプを作成
        const createTestShape = (color = 0x888888) => {
            const shape = new Shape();
            shape.graphics
                .beginFill(color, 1.0)
                .drawRoundRect(0, 0, 80, 50, 8)
                .endFill();
            return shape;
        };

        // ===== フィルターなし（参照用）=====
        const noFilter = createTestShape();
        noFilter.x = 30;
        noFilter.y = 30;
        root.addChild(noFilter);

        // ===== 基本的なグラデーションベベル =====
        const basic = createTestShape();
        basic.x = 140;
        basic.y = 30;
        basic.filters = [new GradientBevelFilter(
            4, 45,
            [0x000000, 0x888888, 0xFFFFFF],
            [1, 1, 1],
            [0, 128, 255],
            4, 4, 1, 1, "inner"
        )];
        root.addChild(basic);

        // ===== カラフルなグラデーション =====
        const colorful = createTestShape();
        colorful.x = 250;
        colorful.y = 30;
        colorful.filters = [new GradientBevelFilter(
            4, 45,
            [0xFF0000, 0xFFFF00, 0x00FF00, 0x00FFFF, 0x0000FF],
            [1, 1, 1, 1, 1],
            [0, 63, 127, 191, 255],
            4, 4, 1, 1, "inner"
        )];
        root.addChild(colorful);

        // ===== 距離が大きい =====
        const farBevel = createTestShape();
        farBevel.x = 360;
        farBevel.y = 30;
        farBevel.filters = [new GradientBevelFilter(
            10, 45,
            [0x000000, 0x888888, 0xFFFFFF],
            [1, 1, 1],
            [0, 128, 255],
            4, 4, 1, 1, "inner"
        )];
        root.addChild(farBevel);

        // ===== 角度90度 =====
        const angle90 = createTestShape();
        angle90.x = 470;
        angle90.y = 30;
        angle90.filters = [new GradientBevelFilter(
            4, 90,
            [0x000000, 0x888888, 0xFFFFFF],
            [1, 1, 1],
            [0, 128, 255],
            4, 4, 1, 1, "inner"
        )];
        root.addChild(angle90);

        // ===== type: outer =====
        const outerBevel = createTestShape();
        outerBevel.x = 30;
        outerBevel.y = 110;
        outerBevel.filters = [new GradientBevelFilter(
            4, 45,
            [0x000000, 0x888888, 0xFFFFFF],
            [1, 1, 1],
            [0, 128, 255],
            6, 6, 1, 1, "outer"
        )];
        root.addChild(outerBevel);

        // ===== type: full =====
        const fullBevel = createTestShape();
        fullBevel.x = 140;
        fullBevel.y = 110;
        fullBevel.filters = [new GradientBevelFilter(
            4, 45,
            [0x000000, 0x888888, 0xFFFFFF],
            [1, 1, 1],
            [0, 128, 255],
            6, 6, 1, 1, "full"
        )];
        root.addChild(fullBevel);

        // ===== ゴールド風 =====
        const gold = createTestShape(0xCC9900);
        gold.x = 250;
        gold.y = 110;
        gold.filters = [new GradientBevelFilter(
            3, 45,
            [0x3D2200, 0xCC9900, 0xFFCC00, 0xFFFF99],
            [1, 1, 1, 1],
            [0, 85, 170, 255],
            4, 4, 1.5, 1, "inner"
        )];
        root.addChild(gold);

        // ===== シルバー風 =====
        const silver = createTestShape(0xAAAAAA);
        silver.x = 360;
        silver.y = 110;
        silver.filters = [new GradientBevelFilter(
            3, 45,
            [0x333333, 0x888888, 0xCCCCCC, 0xFFFFFF],
            [1, 1, 1, 1],
            [0, 85, 170, 255],
            4, 4, 1.5, 1, "inner"
        )];
        root.addChild(silver);

        // ===== 銅風 =====
        const copper = createTestShape(0xBB7733);
        copper.x = 470;
        copper.y = 110;
        copper.filters = [new GradientBevelFilter(
            3, 45,
            [0x331100, 0x884422, 0xBB7733, 0xFFCC99],
            [1, 1, 1, 1],
            [0, 85, 170, 255],
            4, 4, 1.5, 1, "inner"
        )];
        root.addChild(copper);

        // ===== ブラー大 =====
        const bigBlur = createTestShape();
        bigBlur.x = 30;
        bigBlur.y = 190;
        bigBlur.filters = [new GradientBevelFilter(
            4, 45,
            [0x000000, 0x888888, 0xFFFFFF],
            [1, 1, 1],
            [0, 128, 255],
            12, 12, 1, 1, "inner"
        )];
        root.addChild(bigBlur);

        // ===== strength強 =====
        const strongStr = createTestShape();
        strongStr.x = 140;
        strongStr.y = 190;
        strongStr.filters = [new GradientBevelFilter(
            4, 45,
            [0x000000, 0x888888, 0xFFFFFF],
            [1, 1, 1],
            [0, 128, 255],
            4, 4, 3, 1, "inner"
        )];
        root.addChild(strongStr);

        // ===== quality高 =====
        const highQuality = createTestShape();
        highQuality.x = 250;
        highQuality.y = 190;
        highQuality.filters = [new GradientBevelFilter(
            4, 45,
            [0x000000, 0x888888, 0xFFFFFF],
            [1, 1, 1],
            [0, 128, 255],
            6, 6, 1, 3, "inner"
        )];
        root.addChild(highQuality);

        // ===== knockout = true =====
        const knockout = createTestShape();
        knockout.x = 360;
        knockout.y = 190;
        knockout.filters = [new GradientBevelFilter(
            4, 45,
            [0x000000, 0x888888, 0xFFFFFF],
            [1, 1, 1],
            [0, 128, 255],
            4, 4, 1, 1, "inner", true
        )];
        root.addChild(knockout);

        // ===== 半透明グラデーション =====
        const alphaGrad = createTestShape();
        alphaGrad.x = 470;
        alphaGrad.y = 190;
        alphaGrad.filters = [new GradientBevelFilter(
            4, 45,
            [0x000000, 0x888888, 0xFFFFFF],
            [0.3, 1, 0.3],
            [0, 128, 255],
            6, 6, 1, 1, "inner"
        )];
        root.addChild(alphaGrad);

        // ===== 円への適用 =====
        const circleShape = new Shape();
        circleShape.graphics
            .beginFill(0x888888, 1.0)
            .drawCircle(40, 30, 30)
            .endFill();
        circleShape.x = 30;
        circleShape.y = 270;
        circleShape.filters = [new GradientBevelFilter(
            4, 45,
            [0x000000, 0x888888, 0xFFFFFF],
            [1, 1, 1],
            [0, 128, 255],
            4, 4, 1, 1, "inner"
        )];
        root.addChild(circleShape);

        // ===== ボタン風 =====
        const buttonShape = new Shape();
        buttonShape.graphics
            .beginFill(0x3366CC, 1.0)
            .drawRoundRect(0, 0, 120, 40, 10)
            .endFill();
        buttonShape.x = 130;
        buttonShape.y = 275;
        buttonShape.filters = [new GradientBevelFilter(
            2, 45,
            [0x000066, 0x3366CC, 0x6699FF],
            [0.8, 0.5, 0.8],
            [0, 128, 255],
            4, 4, 1, 1, "inner"
        )];
        root.addChild(buttonShape);

        // ===== 六角形への適用 =====
        const hexagon = new Shape();
        hexagon.graphics.beginFill(0x888888, 1.0);
        const cx = 40, cy = 30, r = 28;
        for (let i = 0; i < 6; i++) {
            const angle = (i * 60 - 90) * Math.PI / 180;
            const x = cx + r * Math.cos(angle);
            const y = cy + r * Math.sin(angle);
            if (i === 0) {
                hexagon.graphics.moveTo(x, y);
            } else {
                hexagon.graphics.lineTo(x, y);
            }
        }
        hexagon.graphics.endFill();
        hexagon.x = 280;
        hexagon.y = 270;
        hexagon.filters = [new GradientBevelFilter(
            4, 45,
            [0x000000, 0x888888, 0xFFFFFF],
            [1, 1, 1],
            [0, 128, 255],
            4, 4, 1, 1, "inner"
        )];
        root.addChild(hexagon);

        // ===== 虹色ベベル =====
        const rainbow = createTestShape();
        rainbow.x = 380;
        rainbow.y = 270;
        rainbow.filters = [new GradientBevelFilter(
            4, 45,
            [0xFF0000, 0xFF7F00, 0xFFFF00, 0x00FF00, 0x0000FF, 0x8B00FF],
            [1, 1, 1, 1, 1, 1],
            [0, 51, 102, 153, 204, 255],
            6, 6, 1, 1, "inner"
        )];
        root.addChild(rainbow);

        // ===== ネオン風外側ベベル =====
        const neon = new Shape();
        neon.graphics
            .beginFill(0x333333, 1.0)
            .drawRoundRect(0, 0, 100, 50, 10)
            .endFill();
        neon.x = 480;
        neon.y = 270;
        neon.filters = [new GradientBevelFilter(
            6, 45,
            [0x00FF00, 0x00FF00, 0x000000],
            [0, 1, 0],
            [0, 128, 255],
            8, 8, 2, 1, "outer"
        )];
        root.addChild(neon);

        // ===== 彫り込み風 =====
        const engraved = createTestShape();
        engraved.x = 30;
        engraved.y = 360;
        engraved.filters = [new GradientBevelFilter(
            3, 225,
            [0xFFFFFF, 0x888888, 0x000000],
            [1, 1, 1],
            [0, 128, 255],
            4, 4, 1, 1, "inner"
        )];
        root.addChild(engraved);

        // ===== 浮き出し風 =====
        const raised = createTestShape();
        raised.x = 140;
        raised.y = 360;
        raised.filters = [
            new GradientBevelFilter(
                2, 45,
                [0x000000, 0x888888, 0xFFFFFF],
                [1, 0.5, 1],
                [0, 128, 255],
                4, 4, 1, 1, "inner"
            ),
            new GradientBevelFilter(
                4, 45,
                [0x000000, 0x888888, 0xFFFFFF],
                [0.5, 0, 0.5],
                [0, 128, 255],
                8, 8, 1, 1, "outer"
            )
        ];
        root.addChild(raised);

        // ===== テキスト風 =====
        const textShape = new Shape();
        textShape.graphics
            .beginFill(0x888888, 1.0)
            .drawRect(0, 0, 60, 10)
            .drawRect(25, 0, 10, 40)
            .endFill();
        textShape.x = 270;
        textShape.y = 365;
        textShape.filters = [new GradientBevelFilter(
            2, 45,
            [0x000000, 0x888888, 0xFFFFFF],
            [1, 1, 1],
            [0, 128, 255],
            3, 3, 1, 1, "inner"
        )];
        root.addChild(textShape);

        window.__E2E_RENDER_COMPLETE__ = true;
    });
</script>
</body>
</html>
