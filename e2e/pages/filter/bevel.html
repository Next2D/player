<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Next2D E2E - BevelFilter</title>
    <script defer type="module" src="/src/index.ts"></script>
    <style>
        body { margin: 0; padding: 0; background: #666666; }
    </style>
</head>
<body>
<script type="module">
    window.addEventListener("DOMContentLoaded", async () => {
        const root = await next2d.createRootMovieClip(600, 400, 60);
        const { Shape } = next2d.display;
        const { BevelFilter } = next2d.filters;

        // テスト用シェイプを作成
        const createTestShape = (color = 0x888888) => {
            const shape = new Shape();
            shape.graphics
                .beginFill(color, 1.0)
                .drawRoundRect(0, 0, 80, 50, 8)
                .endFill();
            return shape;
        };

        // ===== 円を最初に追加してテスト =====
        const circleFirst = new Shape();
        circleFirst.graphics
            .beginFill(0x999999, 1.0)
            .drawCircle(0, 0, 30)
            .endFill();
        circleFirst.x = 510;
        circleFirst.y = 60;
        circleFirst.filters = [new BevelFilter(4, 45, 0xFFFFFF, 1, 0x000000, 1, 4, 4, 1, 1, "inner")];
        root.addChild(circleFirst);
        console.log("circleFirst added");

        // ===== フィルターなし（参照用）=====
        const noFilter = createTestShape();
        noFilter.x = 30;
        noFilter.y = 30;
        root.addChild(noFilter);

        // ===== 基本的なベベル =====
        const basic = createTestShape();
        basic.x = 150;
        basic.y = 30;
        basic.filters = [new BevelFilter(4, 45, 0xFFFFFF, 1, 0x000000, 1, 4, 4, 1, 1, "inner")];
        root.addChild(basic);

        // ===== 距離が大きい =====
        const farBevel = createTestShape();
        farBevel.x = 280;
        farBevel.y = 30;
        farBevel.filters = [new BevelFilter(10, 45, 0xFFFFFF, 1, 0x000000, 1, 4, 4, 1, 1, "inner")];
        root.addChild(farBevel);

        // ===== 角度90度 =====
        const angle90 = createTestShape();
        angle90.x = 410;
        angle90.y = 30;
        angle90.filters = [new BevelFilter(4, 90, 0xFFFFFF, 1, 0x000000, 1, 4, 4, 1, 1, "inner")];
        root.addChild(angle90);

        // ===== type: outer =====
        const outerBevel = createTestShape();
        outerBevel.x = 30;
        outerBevel.y = 120;
        outerBevel.filters = [new BevelFilter(4, 45, 0xFFFFFF, 1, 0x000000, 1, 6, 6, 1, 1, "outer")];
        root.addChild(outerBevel);

        // ===== type: full =====
        const fullBevel = createTestShape();
        fullBevel.x = 150;
        fullBevel.y = 120;
        fullBevel.filters = [new BevelFilter(4, 45, 0xFFFFFF, 1, 0x000000, 1, 6, 6, 1, 1, "full")];
        root.addChild(fullBevel);

        // ===== カラフルなベベル =====
        const colorBevel = createTestShape(0x888888);  // 0x666666から変更
        colorBevel.x = 280;
        colorBevel.y = 120;
        colorBevel.filters = [new BevelFilter(4, 45, 0xFF0000, 1, 0x0000FF, 1, 4, 4, 1, 1, "inner")];
        root.addChild(colorBevel);

        // ===== strength 強 =====
        const strongStr = createTestShape();
        strongStr.x = 410;
        strongStr.y = 120;
        strongStr.filters = [new BevelFilter(4, 45, 0xFFFFFF, 1, 0x000000, 1, 4, 4, 3, 1, "inner")];
        root.addChild(strongStr);

        // ===== knockout = true =====
        const knockout = createTestShape();
        knockout.x = 30;
        knockout.y = 210;
        knockout.filters = [new BevelFilter(4, 45, 0xFFFFFF, 1, 0x000000, 1, 4, 4, 1, 1, "inner", true)];
        root.addChild(knockout);

        // ===== 円への適用（異なる色でテスト）=====
        const circleShape = new Shape();
        circleShape.graphics
            .beginFill(0x999999, 1.0)  // 異なる色
            .drawCircle(0, 0, 30)
            .endFill();
        circleShape.x = 195;
        circleShape.y = 240;
        circleShape.filters = [new BevelFilter(4, 45, 0xFFFFFF, 1, 0x000000, 1, 4, 4, 1, 1, "inner")];
        root.addChild(circleShape);

        // ===== ボタン風（色を0x888888でテスト）=====
        const buttonShape = new Shape();
        buttonShape.graphics
            .beginFill(0x888888, 1.0)  // 色を0x888888に変更
            .drawRoundRect(0, 0, 80, 50, 8)
            .endFill();
        buttonShape.x = 280;
        buttonShape.y = 215;
        buttonShape.filters = [new BevelFilter(4, 45, 0xFFFFFF, 1, 0x000000, 1, 4, 4, 1, 1, "inner")];
        root.addChild(buttonShape);

        // ===== 質感 高 =====
        const highQuality = createTestShape();
        highQuality.x = 410;
        highQuality.y = 210;
        highQuality.filters = [new BevelFilter(4, 45, 0xFFFFFF, 1, 0x000000, 1, 6, 6, 1, 3, "inner")];
        root.addChild(highQuality);

        window.__E2E_RENDER_COMPLETE__ = true;
    });
</script>
</body>
</html>
