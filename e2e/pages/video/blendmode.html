<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Next2D E2E - Video BlendModes</title>
    <script defer type="module" src="/src/index.ts"></script>
    <style>
        body { margin: 0; padding: 0; background: #333333; }
    </style>
</head>
<body>
<script type="module">
    window.addEventListener("DOMContentLoaded", async () => {
        const root = await next2d.createRootMovieClip(800, 600, 60);
        const { Video } = next2d.media;
        const { Shape, Sprite, BlendMode } = next2d.display;
        const { TextField, TextFormat } = next2d.text;

        const videoPath = "/e2e/fixtures/videos/movie.mp4";
        const videoScale = 0.2;

        // 全ビデオを追跡
        const allVideos = [];

        const labelFormat = new TextFormat();
        labelFormat.size = 10;
        labelFormat.color = 0xFFFFFF;

        // 背景
        const bgFill = new Shape();
        bgFill.graphics
            .beginFill(0x404040, 1.0)
            .drawRect(0, 0, 800, 600)
            .endFill();
        root.addChild(bgFill);

        // ブレンドモードの配列
        const blendModes = [
            { mode: BlendMode.NORMAL, name: "NORMAL" },
            { mode: BlendMode.ADD, name: "ADD" },
            { mode: BlendMode.MULTIPLY, name: "MULTIPLY" },
            { mode: BlendMode.SCREEN, name: "SCREEN" },
            { mode: BlendMode.OVERLAY, name: "OVERLAY" },
            { mode: BlendMode.DARKEN, name: "DARKEN" },
            { mode: BlendMode.LIGHTEN, name: "LIGHTEN" },
            { mode: BlendMode.HARDLIGHT, name: "HARDLIGHT" }
        ];

        // 各ブレンドモードを配置（4x2グリッド）
        const cols = 4;
        const cellWidth = 190;
        const cellHeight = 140;
        const startX = 15;
        const startY = 10;

        blendModes.forEach((item, index) => {
            const col = index % cols;
            const row = Math.floor(index / cols);
            const x = startX + col * cellWidth;
            const y = startY + row * cellHeight;

            // コンテナ
            const container = new Sprite();
            container.x = x;
            container.y = y;
            root.addChild(container);

            // 背景
            const bg = new Shape();
            bg.graphics
                .beginFill(0xFF0000, 1.0)
                .drawRect(0, 0, 90, 70)
                .endFill();
            container.addChild(bg);

            const bgBlue = new Shape();
            bgBlue.graphics
                .beginFill(0x0000FF, 1.0)
                .drawRect(45, 0, 45, 70)
                .endFill();
            container.addChild(bgBlue);

            // ビデオ
            const video = new Video();
            video.x = 5;
            video.y = 5;
            video.scaleX = videoScale;
            video.scaleY = videoScale;
            video.blendMode = item.mode;
            video.src = videoPath;
            container.addChild(video);
            allVideos.push(video);

            // ラベル
            const label = new TextField();
            label.x = 0;
            label.y = 75;
            label.width = 100;
            label.height = 16;
            label.defaultTextFormat = labelFormat;
            label.text = item.name;
            container.addChild(label);
        });

        // 各ビデオのCOMPLETEイベントを待機
        await Promise.all(allVideos.map(video => {
            return new Promise((resolve) => {
                if (video.loaded && !video.paused) {
                    resolve();
                } else {
                    video.addEventListener("complete", () => resolve());
                }
            });
        }));

        // 固定フレームのためにシークして一時停止
        const SEEK_TIME = 1.0; // 1秒の位置にシーク

        await Promise.all(allVideos.map(video => {
            return new Promise((resolve) => {
                if (!video.$videoElement) {
                    resolve();
                    return;
                }

                const onSeeked = () => {
                    video.$videoElement.removeEventListener("seeked", onSeeked);
                    video.pause();
                    resolve();
                };

                video.$videoElement.addEventListener("seeked", onSeeked);
                video.seek(SEEK_TIME);
            });
        }));

        // 親のchangedフラグも更新する関数
        const applyChanges = (displayObject) => {
            displayObject.changed = true;
            let parent = displayObject.parent;
            while (parent && !parent.changed) {
                parent.changed = true;
                parent = parent.parent;
            }
        };

        // ビデオのchangedフラグを更新してレンダリングを強制
        allVideos.forEach((video) => {
            if (video.$videoElement && video.$videoElement.readyState >= 2) {
                applyChanges(video);
            }
        });

        // レンダリング安定化のため数フレーム待機
        await new Promise((resolve) => {
            let frameCount = 0;
            const waitFrames = () => {
                allVideos.forEach((video) => {
                    if (video.$videoElement && video.$videoElement.readyState >= 2) {
                        applyChanges(video);
                    }
                });
                frameCount++;
                if (frameCount >= 10) {
                    resolve();
                } else {
                    requestAnimationFrame(waitFrames);
                }
            };
            requestAnimationFrame(waitFrames);
        });

        window.__E2E_RENDER_COMPLETE__ = true;
    });
</script>
</body>
</html>
