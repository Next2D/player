<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Next2D E2E - Video Playback</title>
    <script defer type="module" src="/src/index.ts"></script>
    <style>
        body { margin: 0; padding: 0; background: #333333; }
    </style>
</head>
<body>
<script type="module">
    window.addEventListener("DOMContentLoaded", async () => {
        const root = await next2d.createRootMovieClip(800, 600, 60);
        const { Video } = next2d.media;
        const { Shape, Sprite, BlendMode } = next2d.display;
        const { GlowFilter, BlurFilter, BevelFilter } = next2d.filters;

        const videoPath = "/e2e/fixtures/videos/movie.mp4";

        // ===== 通常サイズのビデオ =====
        const video1 = new Video(200, 150);
        video1.x = 20;
        video1.y = 20;
        video1.src = videoPath;
        root.addChild(video1);

        // ===== スケールされたビデオ =====
        const video2 = new Video(200, 150);
        video2.x = 250;
        video2.y = 20;
        video2.scaleX = 0.75;
        video2.scaleY = 0.75;
        video2.src = videoPath;
        root.addChild(video2);

        // ===== 回転されたビデオ =====
        const video3 = new Video(150, 100);
        video3.x = 450;
        video3.y = 80;
        video3.rotation = 15;
        video3.src = videoPath;
        root.addChild(video3);

        // ===== BlendMode: ADD =====
        const addContainer = new Sprite();
        addContainer.x = 20;
        addContainer.y = 200;
        root.addChild(addContainer);

        const addBg = new Shape();
        addBg.graphics
            .beginFill(0x003366, 1.0)
            .drawRect(0, 0, 180, 130)
            .endFill();
        addContainer.addChild(addBg);

        const videoAdd = new Video(140, 100);
        videoAdd.x = 20;
        videoAdd.y = 15;
        videoAdd.blendMode = BlendMode.ADD;
        videoAdd.src = videoPath;
        addContainer.addChild(videoAdd);

        // ===== BlendMode: MULTIPLY =====
        const multiplyContainer = new Sprite();
        multiplyContainer.x = 220;
        multiplyContainer.y = 200;
        root.addChild(multiplyContainer);

        const multiplyBg = new Shape();
        multiplyBg.graphics
            .beginFill(0xFFFF00, 1.0)
            .drawRect(0, 0, 180, 130)
            .endFill();
        multiplyContainer.addChild(multiplyBg);

        const videoMultiply = new Video(140, 100);
        videoMultiply.x = 20;
        videoMultiply.y = 15;
        videoMultiply.blendMode = BlendMode.MULTIPLY;
        videoMultiply.src = videoPath;
        multiplyContainer.addChild(videoMultiply);

        // ===== BlendMode: SCREEN =====
        const screenContainer = new Sprite();
        screenContainer.x = 420;
        screenContainer.y = 200;
        root.addChild(screenContainer);

        const screenBg = new Shape();
        screenBg.graphics
            .beginFill(0x660066, 1.0)
            .drawRect(0, 0, 180, 130)
            .endFill();
        screenContainer.addChild(screenBg);

        const videoScreen = new Video(140, 100);
        videoScreen.x = 20;
        videoScreen.y = 15;
        videoScreen.blendMode = BlendMode.SCREEN;
        videoScreen.src = videoPath;
        screenContainer.addChild(videoScreen);

        // ===== フィルター: BlurFilter =====
        const videoBlur = new Video(180, 120);
        videoBlur.x = 20;
        videoBlur.y = 360;
        videoBlur.filters = [new BlurFilter(6, 6, 1)];
        videoBlur.src = videoPath;
        root.addChild(videoBlur);

        // ===== フィルター: GlowFilter =====
        const videoGlow = new Video(180, 120);
        videoGlow.x = 220;
        videoGlow.y = 360;
        videoGlow.filters = [new GlowFilter(0x00FFFF, 1, 10, 10, 2, 1)];
        videoGlow.src = videoPath;
        root.addChild(videoGlow);

        // ===== フィルター: BevelFilter =====
        const videoBevel = new Video(180, 120);
        videoBevel.x = 420;
        videoBevel.y = 360;
        videoBevel.filters = [new BevelFilter(4, 45, 0xFFFFFF, 1, 0x000000, 1, 4, 4, 1, 1)];
        videoBevel.src = videoPath;
        root.addChild(videoBevel);

        // ===== 複合: BlendMode + Filter =====
        const compositeContainer = new Sprite();
        compositeContainer.x = 620;
        compositeContainer.y = 200;
        root.addChild(compositeContainer);

        const compositeBg = new Shape();
        compositeBg.graphics
            .beginFill(0x333300, 1.0)
            .drawRect(0, 0, 160, 280)
            .endFill();
        compositeContainer.addChild(compositeBg);

        const videoComposite = new Video(120, 90);
        videoComposite.x = 20;
        videoComposite.y = 20;
        videoComposite.blendMode = BlendMode.ADD;
        videoComposite.filters = [new GlowFilter(0xFF8800, 1, 8, 8, 1.5, 1)];
        videoComposite.src = videoPath;
        compositeContainer.addChild(videoComposite);

        // 異なるフィルター設定の複合
        const videoComposite2 = new Video(120, 90);
        videoComposite2.x = 20;
        videoComposite2.y = 130;
        videoComposite2.blendMode = BlendMode.OVERLAY;
        videoComposite2.filters = [new BevelFilter(3, 135, 0xFF0000, 1, 0x0000FF, 1, 5, 5, 1, 1)];
        videoComposite2.src = videoPath;
        compositeContainer.addChild(videoComposite2);

        window.__E2E_RENDER_COMPLETE__ = true;
    });
</script>
</body>
</html>
