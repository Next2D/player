<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Next2D E2E - Video Debug</title>
    <script defer type="module" src="/src/index.ts"></script>
    <style>
        body { margin: 0; padding: 0; background: #333333; }
        #debug { position: fixed; top: 10px; left: 10px; color: white; font-family: monospace; font-size: 12px; z-index: 9999; background: rgba(0,0,0,0.7); padding: 10px; }
    </style>
</head>
<body>
<div id="debug">Loading...</div>
<script type="module">
    const debugEl = document.getElementById("debug");
    const log = (msg) => {
        debugEl.innerHTML += "<br>" + msg;
        console.log(msg);
    };

    window.addEventListener("DOMContentLoaded", async () => {
        log("DOMContentLoaded");

        const root = await next2d.createRootMovieClip(600, 400, 60);
        log("Root created");
        log(`Root parent: ${root.parent ? root.parent.namespace : 'null'}`);
        log(`Stage changed: ${root.parent ? root.parent.changed : 'N/A'}`);

        // テスト用のShapeを追加してレンダリングが動作するか確認
        const { Shape } = next2d.display;
        const testShape = new Shape();
        testShape.graphics.beginFill(0xFF0000, 1.0);
        testShape.graphics.drawRect(0, 0, 100, 100);
        testShape.graphics.endFill();
        testShape.x = 400;
        testShape.y = 50;
        root.addChild(testShape);
        log("Test shape added (red square at 400,50)");

        const { Video } = next2d.media;
        const { Event, VideoEvent } = next2d.events;

        const videoPath = "/e2e/fixtures/videos/movie.mp4";

        // 単一のビデオを作成
        const video = new Video(300, 200);
        video.x = 50;
        video.y = 50;

        log(`Video created: ${video.videoWidth}x${video.videoHeight}`);
        log(`Initial state - loaded: ${video.loaded}, paused: ${video.paused}, autoPlay: ${video.autoPlay}`);

        // イベントリスナーを追加
        video.addEventListener(Event.COMPLETE, () => {
            log(`Event.COMPLETE - loaded: ${video.loaded}, paused: ${video.paused}`);
            log(`$videoElement: ${!!video.$videoElement}, $offscreenCanvas: ${!!video.$offscreenCanvas}, $context: ${!!video.$context}`);
            if (video.$videoElement) {
                log(`HTMLVideoElement - videoWidth: ${video.$videoElement.videoWidth}, videoHeight: ${video.$videoElement.videoHeight}`);
                log(`HTMLVideoElement - readyState: ${video.$videoElement.readyState}, paused: ${video.$videoElement.paused}`);
            }
            if (video.$offscreenCanvas) {
                log(`OffscreenCanvas - width: ${video.$offscreenCanvas.width}, height: ${video.$offscreenCanvas.height}`);
            }
            log(`Video object - videoWidth: ${video.videoWidth}, videoHeight: ${video.videoHeight}`);
            log(`Video visible: ${video.visible}, uniqueKey: ${video.uniqueKey}`);
            log(`Video parent: ${video.parent ? video.parent.namespace : 'null'}`);
            log(`Root changed: ${root.changed}, Stage changed: ${root.parent ? root.parent.changed : 'N/A'}`);
        });

        video.src = videoPath;
        log(`src set to: ${videoPath}`);
        log(`$videoElement after src: ${!!video.$videoElement}`);

        root.addChild(video);
        log("Video added to root");
        log(`Root children count: ${root.children.length}`);
        root.children.forEach((child, idx) => {
            log(`  Child ${idx}: isVideo=${child.isVideo}, visible=${child.visible}, namespace=${child.namespace}`);
        });

        // デバッグ用：オフスクリーンキャンバスの内容をDOM上のcanvasに描画
        const debugCanvas = document.createElement("canvas");
        debugCanvas.style.position = "fixed";
        debugCanvas.style.bottom = "10px";
        debugCanvas.style.right = "10px";
        debugCanvas.style.border = "2px solid yellow";
        debugCanvas.style.zIndex = "9999";
        document.body.appendChild(debugCanvas);

        // 状態を定期的にログ
        let checkCount = 0;
        const checkInterval = setInterval(() => {
            checkCount++;
            log(`Check ${checkCount}: loaded=${video.loaded}, paused=${video.paused}, changed=${video.changed}`);

            // オフスクリーンキャンバスの内容をデバッグcanvasに描画
            if (video.$videoElement) {
                const ve = video.$videoElement;
                debugCanvas.width = 320;
                debugCanvas.height = 180;
                const ctx = debugCanvas.getContext("2d");
                if (ctx) {
                    try {
                        // 直接ビデオ要素から描画してみる
                        ctx.drawImage(ve, 0, 0, 320, 180);
                        log(`Debug canvas draw: success, currentTime=${ve.currentTime.toFixed(2)}`);
                    } catch (e) {
                        log(`Debug canvas draw error: ${e.message}`);
                    }
                }
            }

            if (video.loaded && !video.paused && checkCount >= 5) {
                log("Video is playing! (after 5 checks)");
                clearInterval(checkInterval);

                // さらに10フレーム待つ
                let frameCount = 0;
                const waitFrames = () => {
                    frameCount++;
                    if (frameCount >= 10) {
                        log("Ready for screenshot");
                        window.__E2E_RENDER_COMPLETE__ = true;
                    } else {
                        requestAnimationFrame(waitFrames);
                    }
                };
                requestAnimationFrame(waitFrames);
            } else if (checkCount > 100) {
                log("Timeout waiting for video to play");
                clearInterval(checkInterval);
                window.__E2E_RENDER_COMPLETE__ = true;
            }
        }, 100);
    });
</script>
</body>
</html>
