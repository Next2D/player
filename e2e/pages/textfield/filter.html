<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Next2D E2E - TextField Filters</title>
    <script defer type="module" src="/src/index.ts"></script>
    <style>
        body { margin: 0; padding: 0; background: #666666; }
    </style>
</head>
<body>
<script type="module">
    window.addEventListener("DOMContentLoaded", async () => {
        const root = await next2d.createRootMovieClip(900, 700, 60);
        const { Shape, Sprite } = next2d.display;
        const { TextField, TextFormat } = next2d.text;
        const {
            BlurFilter,
            DropShadowFilter,
            GlowFilter,
            BevelFilter,
            ColorMatrixFilter,
            ConvolutionFilter,
            GradientBevelFilter,
            GradientGlowFilter

        const titleFormat = new TextFormat();
        titleFormat.size = 11;
        titleFormat.color = 0xFFFFFF;
        titleFormat.bold = true;

        const textStyle = new TextFormat();
        textStyle.size = 18;
        textStyle.color = 0xFFFFFF;
        textStyle.bold = true;
        textStyle.align = "center";

        // ===== BlurFilter =====
        const blur1 = new TextField();
        blur1.x = 20;
        blur1.y = 20;
        blur1.width = 120;
        blur1.height = 50;
        blur1.background = true;
        blur1.backgroundColor = 0x336699;
        blur1.defaultTextFormat = textStyle;
        blur1.text = "Blur";
        blur1.filters = [new BlurFilter(4, 4, 1)];
        root.addChild(blur1);

        const blurLabel1 = new TextField();
        blurLabel1.x = 20;
        blurLabel1.y = 72;
        blurLabel1.width = 120;
        blurLabel1.height = 16;
        blurLabel1.defaultTextFormat = titleFormat;
        blurLabel1.text = "Blur(4,4,1)";
        root.addChild(blurLabel1);

        const blur2 = new TextField();
        blur2.x = 160;
        blur2.y = 20;
        blur2.width = 120;
        blur2.height = 50;
        blur2.background = true;
        blur2.backgroundColor = 0x336699;
        blur2.defaultTextFormat = textStyle;
        blur2.text = "Blur";
        blur2.filters = [new BlurFilter(10, 10, 2)];
        root.addChild(blur2);

        const blurLabel2 = new TextField();
        blurLabel2.x = 160;
        blurLabel2.y = 72;
        blurLabel2.width = 120;
        blurLabel2.height = 16;
        blurLabel2.defaultTextFormat = titleFormat;
        blurLabel2.text = "Blur(10,10,2)";
        root.addChild(blurLabel2);

        // ===== DropShadowFilter =====
        const dropShadow1 = new TextField();
        dropShadow1.x = 300;
        dropShadow1.y = 20;
        dropShadow1.width = 120;
        dropShadow1.height = 50;
        dropShadow1.background = true;
        dropShadow1.backgroundColor = 0x336699;
        dropShadow1.defaultTextFormat = textStyle;
        dropShadow1.text = "Shadow";
        dropShadow1.filters = [new DropShadowFilter(4, 45, 0x000000, 1, 4, 4, 1, 1)];

        dsLabel1.y = 72;
        dsLabel1.width = 120;

        dsLabel1.defaultTextFormat = titleFormat;
        dsLabel1.text = "DropShadow";
        root.addChild(dsLabel1);

        dropShadow2.x = 440;
        dropShadow2.y = 20;
        dropShadow2.width = 120;
        dropShadow2.height = 50;
        dropShadow2.background = true;
        dropShadow2.backgroundColor = 0x336699;
        dropShadow2.defaultTextFormat = textStyle;
        dropShadow2.text = "Inner";
        dropShadow2.filters = [new DropShadowFilter(8, 135, 0xFF0000, 0.8, 8, 8, 2, 1, false, false, true)];

        dsLabel2.x = 440;
        dsLabel2.y = 72;
        dsLabel2.width = 120;
        dsLabel2.height = 16;
        dsLabel2.defaultTextFormat = titleFormat;
        dsLabel2.text = "DropShadow Inner";

        glowLabel1.width = 120;

        glowLabel1.text = "Glow Green";

        glow2.y = 20;
        glow2.width = 120;
        glow2.height = 50;

        glow2.backgroundColor = 0x336699;
        glow2.defaultTextFormat = textStyle;
        glow2.text = "Inner";

        bevel1.y = 110;
        bevel1.width = 120;
        bevel1.height = 50;
        bevel1.background = true;
        bevel1.backgroundColor = 0x336699;
        bevel1.defaultTextFormat = textStyle;
        bevel1.text = "Bevel";
        bevel1.filters = [new BevelFilter(4, 45, 0xFFFFFF, 1, 0x000000, 1, 4, 4, 1, 1)];

        bevelLabel1.x = 20;
        bevelLabel1.y = 162;
        bevelLabel1.width = 120;
        bevelLabel1.height = 16;
        bevelLabel1.defaultTextFormat = titleFormat;
        bevelLabel1.text = "Bevel Inner";

        bevel2.height = 50;

        bevel2.backgroundColor = 0x336699;
        bevel2.defaultTextFormat = textStyle;

        bevelLabel2.width = 120;
        bevelLabel2.height = 16;
        bevelLabel2.defaultTextFormat = titleFormat;

        colorMatrix2.height = 50;
        colorMatrix2.background = true;
        colorMatrix2.backgroundColor = 0x336699;
        colorMatrix2.defaultTextFormat = textStyle;

        colorMatrix2.filters = [new ColorMatrixFilter(sepiaMatrix)];

        const cmLabel2 = new TextField();
        cmLabel2.x = 580;
        cmLabel2.y = 162;
        cmLabel2.width = 120;
        cmLabel2.height = 16;
        cmLabel2.defaultTextFormat = titleFormat;
        cmLabel2.text = "Sepia";
        root.addChild(cmLabel2);

        // 反転

            -1, 0, 0, 0, 255,

            0, 0, -1, 0, 255,
            0, 0, 0, 1, 0

        const sharpMatrix = [
            0, -1, 0,

        convolution1.filters = [new ConvolutionFilter(3, 3, sharpMatrix, 1)];

        const convLabel1 = new TextField();
        convLabel1.x = 20;
        convLabel1.y = 252;
        convLabel1.width = 120;
        convLabel1.height = 16;
        convLabel1.defaultTextFormat = titleFormat;
        convLabel1.text = "Sharpen";
        root.addChild(convLabel1);

        // エッジ検出
        const edgeMatrix = [
            -1, -1, -1,
            -1, 8, -1,
            -1, -1, -1

        convolution2.x = 160;
        convolution2.y = 200;
        convolution2.width = 120;
        convolution2.height = 50;
        convolution2.background = true;
        convolution2.backgroundColor = 0x336699;
        convolution2.defaultTextFormat = textStyle;

        const convLabel2 = new TextField();
        convLabel2.x = 160;
        convLabel2.y = 252;
        convLabel2.width = 120;
        convLabel2.height = 16;
        convLabel2.defaultTextFormat = titleFormat;
        convLabel2.text = "Edge Detect";
        root.addChild(convLabel2);

        // エンボス
        const embossMatrix = [
            -2, -1, 0,
            -1, 1, 1,
            0, 1, 2

        const convolution3 = new TextField();
        convolution3.x = 300;
        convolution3.y = 200;
        convolution3.width = 120;
        convolution3.height = 50;
        convolution3.background = true;
        convolution3.backgroundColor = 0x336699;
        convolution3.defaultTextFormat = textStyle;
        convolution3.text = "Emboss";
        convolution3.filters = [new ConvolutionFilter(3, 3, embossMatrix, 1)];
        root.addChild(convolution3);

        const convLabel3 = new TextField();
        convLabel3.x = 300;
        convLabel3.y = 252;
        convLabel3.width = 120;
        convLabel3.height = 16;
        convLabel3.defaultTextFormat = titleFormat;
        convLabel3.text = "Emboss";
        root.addChild(convLabel3);

        // ===== GradientGlowFilter =====
        const gradGlow1 = new TextField();
        gradGlow1.x = 440;
        gradGlow1.y = 200;
        gradGlow1.width = 120;
        gradGlow1.height = 50;
        gradGlow1.background = true;
        gradGlow1.backgroundColor = 0x336699;
        gradGlow1.defaultTextFormat = textStyle;
        gradGlow1.text = "GGlow";
        gradGlow1.filters = [new GradientGlowFilter(
            4, 45,
            [0xFF0000, 0xFFFF00, 0x00FF00],
            [1, 1, 1],
            [0, 127, 255],
            8, 8, 2, 1
        )];
        root.addChild(gradGlow1);

        const ggLabel1 = new TextField();
        ggLabel1.x = 440;
        ggLabel1.y = 252;
        ggLabel1.width = 120;
        ggLabel1.height = 16;
        ggLabel1.defaultTextFormat = titleFormat;
        ggLabel1.text = "GradientGlow";
        root.addChild(ggLabel1);

        // ===== GradientBevelFilter =====
        const gradBevel1 = new TextField();
        gradBevel1.x = 580;
        gradBevel1.y = 200;
        gradBevel1.width = 120;

        compLabel1.x = 720;
