<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Next2D - BlendMode Test</title>
    <script defer type="module" src="./src/index.ts"></script>
</head>
<body style="margin: 0; padding: 0; background: #333333;">
<script>
    window.addEventListener("DOMContentLoaded", async () =>
    {
        await next2d.load("develop");
        return ;
        const root = await next2d.createRootMovieClip(800, 600, 60);
        const { Shape, BlendMode } = next2d.display;

        console.log("=== Full BlendMode Test ===");

        // 背景用の赤い矩形（上段）
        const baseBg1 = root.addChild(new Shape());
        baseBg1.graphics
            .beginFill(0xFF0000, 1.0)
            .drawRect(50, 50, 700, 100)
            .endFill();

        // 背景用の赤い矩形（下段）
        const baseBg2 = root.addChild(new Shape());
        baseBg2.graphics
            .beginFill(0xFF0000, 1.0)
            .drawRect(50, 180, 700, 100)
            .endFill();

        // 上段のブレンドモード
        const modes1 = [
            { mode: BlendMode.NORMAL, name: "normal", x: 60 },
            { mode: BlendMode.ADD, name: "add", x: 160 },
            { mode: BlendMode.SCREEN, name: "screen", x: 260 },
            { mode: BlendMode.ALPHA, name: "alpha", x: 360 },
            { mode: BlendMode.ERASE, name: "erase", x: 460 },
            { mode: BlendMode.COPY, name: "copy", x: 560 }
        ];

        for (const { mode, name, x } of modes1) {
            const shape = root.addChild(new Shape());
            shape.graphics
                .beginFill(0x00FF00, 0.7)
                .drawRect(x, 60, 80, 80)
                .endFill();
            shape.blendMode = mode;
            console.log(`Test: ${name}`);
        }

        // 下段でmultiply, overlay等の複雑なブレンドモード
        const modes2 = [
            { mode: BlendMode.MULTIPLY, name: "multiply", x: 60 },
            { mode: BlendMode.OVERLAY, name: "overlay", x: 160 },
            { mode: BlendMode.DARKEN, name: "darken", x: 260 },
            { mode: BlendMode.LIGHTEN, name: "lighten", x: 360 },
            { mode: BlendMode.HARDLIGHT, name: "hardlight", x: 460 }
        ];

        for (const { mode, name, x } of modes2) {
            const shape = root.addChild(new Shape());
            shape.graphics
                .beginFill(0x00FF00, 0.7)
                .drawRect(x, 190, 80, 80)
                .endFill();
            shape.blendMode = mode;
            console.log(`Test: ${name}`);
        }

        console.log("=== Test Complete ===");
    });
</script>
</body>
</html>
